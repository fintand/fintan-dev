# Daily Intervals.icu sync: fetches YTD ride/run totals into content/activity.json and
# commits the change — the push triggers the Vercel rebuild, so the numbers are
# baked into the prerendered /now page. Builds themselves never call Intervals.icu.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   INTERVALS_API_KEY — from Intervals.icu account settings.
name: Sync Intervals stats

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Intervals.icu stats
        run: node scripts/fetch-intervals.mjs
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}

      - name: Commit if changed
        run: |
          if git diff --quiet content/activity.json; then
            echo "No change — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/activity.json
          git commit -m "Update activity stats ($(date -u +%F))"
          git push
